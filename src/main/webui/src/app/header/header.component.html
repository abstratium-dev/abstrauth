<div class="header">
    <div class="header-left">
        <img [src]="brandLogoUrl$()" [alt]="brandLogoAlt$()" class="logo">
        <span class="brand-name">{{ brandName$() }}</span>
    </div>

    <div class="header-right">
        <button
            class="theme-toggle-btn"
            (click)="toggleTheme()"
            [attr.aria-label]="themeService.theme$() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'"
            [title]="themeService.theme$() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'">
            @if(themeService.theme$() === 'light') {
                🌙
            } @else {
                ☀️
            }
        </button>
        <a id="legal-link" routerLink="/legal" routerLinkActive="inactive-link">Legal</a>
        &nbsp;|&nbsp;
        <a id="home-link" routerLink="/" routerLinkActive="inactive-link" title="Home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9 22V12H15V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        @if(isSignedIn) {
            &nbsp;|&nbsp;
            <a id="clients-link" routerLink="/clients" routerLinkActive="inactive-link">Clients</a>
            &nbsp;|&nbsp;
            <a id="accounts-link" routerLink="/accounts" routerLinkActive="inactive-link">Accounts</a>
            &nbsp;|&nbsp;
            <a id="organisations-link" routerLink="/organisations" routerLinkActive="inactive-link">Organisations</a>
            &nbsp;|&nbsp;
            🥷 <a id="user-link" routerLink="/user" routerLinkActive="inactive-link">{{ token.name }}</a>@if(currentOrg()) { &nbsp;(<a [routerLink]="['/organisations', currentOrg()!.id]" class="client-link" id="current-org-link">{{ currentOrg()!.name }}</a>) }
            &nbsp;|&nbsp;
            <a id="signout-link" class="alink" (click)="signout()">Sign out</a>
        } @else {
            &nbsp;|&nbsp;
            <a id="signin-link" class="alink" (click)="signin()">Sign in</a>
        }
    </div>
    
</div>
<div>
    @if (emailMismatchWarning) {
        <div class="warning-box" style="background-color: #fff3cd; border: 1px solid #ffc107; padding: 15px; margin-bottom: 20px; border-radius: 4px;">
            <strong>⚠️ Warning:</strong> {{ emailMismatchWarning }}
        </div>
    }
</div>
