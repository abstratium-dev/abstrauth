<div class="container">
  <div class="page-header">
    <h1>Organisations</h1>
    <button *ngIf="!loading" id="create-org-button" class="btn-add" (click)="toggleCreateForm()"
      [disabled]="formSubmitting()">
      {{ showCreateForm() ? 'Cancel' : '+ New Organisation' }}
    </button>
  </div>

  <div *ngIf="loading" class="loading">
    <p>Loading organisations...</p>
  </div>

  <div *ngIf="error" class="error-box">
    <p>{{ error }}</p>
    <button (click)="retry()">Retry</button>
  </div>

  <!-- Create Organisation Form -->
  <div *ngIf="showCreateForm() && !loading" class="form-container">
    <h2>New Organisation</h2>
    <form (ngSubmit)="onSubmitCreate()">
      <div *ngIf="formError()" class="error-box">{{ formError() }}</div>
      <div class="form-group">
        <label for="org-name">Organisation Name *</label>
        <input
          type="text"
          id="org-name"
          name="orgName"
          [(ngModel)]="newOrgName"
          required
          placeholder="e.g. Acme Corp"
          [disabled]="formSubmitting()">
        <small class="form-hint">Name for your new organisation</small>
      </div>
      <div class="form-actions">
        <button type="submit" id="submit-create-org-button" class="btn-primary" [disabled]="formSubmitting()">
          {{ formSubmitting() ? 'Creating...' : 'Create Organisation' }}
        </button>
        <button type="button" id="cancel-create-org-button" class="btn-secondary" (click)="toggleCreateForm()" [disabled]="formSubmitting()">
          Cancel
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="!loading && !error && organisations.length === 0" class="info-message">
    <p>You are not a member of any organisations.</p>
  </div>

  <div *ngIf="deleteError()" class="error-box">
    <p>{{ deleteError() }}</p>
  </div>

  <div *ngIf="!loading && !error && organisations.length > 0" class="tile-grid">
    <div class="tile" [class.highlighted-tile]="isCurrentOrg(org.id)" *ngFor="let org of organisations">
      <div class="tile-header">
        <div class="tile-info">
          <h3 class="tile-title"><a [routerLink]="['/organisations', org.id]" class="client-link">{{ org.name }}</a></h3>
          <p class="tile-subtitle">ID: {{ org.id }}</p>
        </div>
        <div class="tile-header-actions">
          <div class="tile-badges">
            <span *ngFor="let role of org.roles" class="badge" [ngClass]="getRoleBadgeClass(role)">{{ role }}</span>
            <span *ngIf="isCurrentOrg(org.id)" class="badge badge-verified">&#10003; Current</span>
          </div>
          <a class="tile-action-link"
             [routerLink]="['/audit', 'organisation', org.id]"
             title="View audit history">
            🕒
          </a>
          <button *ngIf="isAdmin()"
                  class="btn-delete-small"
                  [attr.data-testid]="'delete-org-' + org.id"
                  [disabled]="deletingOrgId() === org.id"
                  (click)="onDeleteOrg(org.id, org.name)"
                  title="Delete organisation">
            {{ deletingOrgId() === org.id ? 'Deleting...' : 'Delete' }}
          </button>
        </div>
      </div>
      <div class="tile-details">
        <div class="tile-detail-item">
          <span class="label">Created:</span>
          <span class="value">{{ org.createdAt | date:'medium' }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
